<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информатика 7 класс: Тест по сетям и архивации</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .test-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .question {
            background-color: #f9f9f9;
            border-left: 5px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question p {
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }
        .options label {
            display: block;
            margin-bottom: 8px;
            padding: 8px;
            background-color: #fff;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .options label:hover {
            background-color: #e8f0fe;
            border-color: #667eea;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 20px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>📚 Информатика, 7 класс</h1>
        <h2>Тест: Локальные сети и архивация</h2>
        <p style="text-align: center; color: #555;">Выберите один правильный ответ в каждом вопросе</p>

        <div id="quiz"></div>

        <button id="submitBtn">✅ Проверить ответы</button>
        <div id="result" class="result-box"></div>
        <div class="footer">Нажми на кнопку, чтобы узнать результат</div>
    </div>

    <script>
        // Массив с вопросами, вариантами ответов и правильными индексами (начиная с 0)
        const questions = [
            {
                question: "1. Какова основная причина объединения компьютеров в локальную сеть?",
                options: [
                    "Для увеличения скорости работы каждого компьютера",
                    "Для совместного использования ресурсов (принтеров, файлов, программ)",
                    "Для защиты компьютеров от вирусов",
                    "Для автоматического обновления операционной системы"
                ],
                correct: 1
            },
            {
                question: "2. Как называется компьютер в локальной сети, который предоставляет свои ресурсы всем остальным компьютерам и управляет их работой?",
                options: [
                    "Клиент",
                    "Рабочая станция",
                    "Сервер",
                    "Архиватор"
                ],
                correct: 2
            },
            {
                question: "3. Какое аппаратное обеспечение необходимо для подключения компьютера к проводной локальной сети?",
                options: [
                    "Wi-Fi адаптер и модем",
                    "Сетевая карта (плата) и специальный кабель",
                    "Только принтер",
                    "Звуковая карта и колонки"
                ],
                correct: 1
            },
            {
                question: "4. В какой папке операционной системы Windows обычно можно увидеть список всех компьютеров, входящих в локальную сеть?",
                options: [
                    "Мой компьютер",
                    "Корзина",
                    "Сеть",
                    "Панель управления"
                ],
                correct: 2
            },
            {
                question: "5. В каких единицах измерения обычно измеряется скорость передачи информации в компьютерной сети?",
                options: [
                    "В байтах в секунду (байт/с)",
                    "В герцах (Гц)",
                    "В битах в секунду (бит/с)",
                    "В метрах в секунду (м/с)"
                ],
                correct: 2
            },
            {
                question: "6. Для какой цели используются программы-архиваторы?",
                options: [
                    "Для проверки компьютера на вирусы",
                    "Для создания резервных копий и уменьшения размера файлов",
                    "Для ускорения работы процессора",
                    "Для подключения к интернету"
                ],
                correct: 1
            },
            {
                question: "7. Какое расширение может иметь архивный файл?",
                options: [
                    ".exe",
                    ".txt",
                    ".jpg",
                    ".zip"
                ],
                correct: 3
            },
            {
                question: "8. Кто из перечисленных учёных внёс вклад в развитие теории сжатия информации?",
                options: [
                    "Илон Маск",
                    "Клод Шеннон",
                    "Билл Гейтс",
                    "Стив Джобс"
                ],
                correct: 1
            },
            {
                question: "9. Что произойдёт, если в контекстном меню архива выбрать команду «Извлечь в текущую папку»?",
                options: [
                    "Архив будет удалён",
                    "Файлы из архива будут распакованы в ту же папку, где находится сам архив",
                    "Будет создан новый архив",
                    "Откроется окно для выбора пароля"
                ],
                correct: 1
            },
            {
                question: "10. Что из перечисленного НЕ является функцией программы-архиватора?",
                options: [
                    "Помещение файлов в архив",
                    "Извлечение файлов из архива",
                    "Защита информации паролем",
                    "Форматирование флешки"
                ],
                correct: 3
            }
        ];

        // Функция для отображения теста
        function renderQuiz() {
            const quizContainer = document.getElementById('quiz');
            let html = '';
            questions.forEach((q, index) => {
                html += `<div class="question">`;
                html += `<p>${q.question}</p>`;
                html += `<div class="options">`;

                q.options.forEach((option, optIndex) => {
                    html += `<label>`;
                    html += `<input type="radio" name="q${index}" value="${optIndex}">`;
                    html += `${option}`;
                    html += `</label>`;
                });

                html += `</div>`; // закрываем options
                html += `</div>`; // закрываем question
            });
            quizContainer.innerHTML = html;
        }

        // Функция для подсчета результатов
        function calculateResult() {
            let correctCount = 0;

            questions.forEach((q, index) => {
                // Находим все радио-кнопки для этого вопроса
                const radios = document.getElementsByName(`q${index}`);
                for (let i = 0; i < radios.length; i++) {
                    if (radios[i].checked) {
                        // Если выбранный индекс совпадает с правильным
                        if (parseInt(radios[i].value) === q.correct) {
                            correctCount++;
                        }
                        break; // Нашли выбранный ответ, дальше не ищем
                    }
                }
            });

            return correctCount;
        }

        // Обработчик кнопки
        document.getElementById('submitBtn').addEventListener('click', () => {
            const totalQuestions = questions.length;
            const correctAnswers = calculateResult();
            const score = Math.round((correctAnswers / totalQuestions) * 100);

            const resultDiv = document.getElementById('result');

            // Очищаем старые классы
            resultDiv.classList.remove('pass', 'fail');

            let message = `Вы ответили правильно на ${correctAnswers} из ${totalQuestions} вопросов. (${score}%)`;

            if (correctAnswers === totalQuestions) {
                message = `🎉 Превосходно! ${message}`;
                resultDiv.classList.add('pass');
            } else if (correctAnswers >= 7) { // 70% и выше - проходной балл
                message = `👍 Хорошо! ${message}`;
                resultDiv.classList.add('pass');
            } else {
                message = `😔 Попробуйте еще раз. ${message}`;
                resultDiv.classList.add('fail');
            }

            resultDiv.textContent = message;
        });

        // Запускаем отрисовку теста при загрузке страницы
        renderQuiz();
    </script>
</body>
</html>
